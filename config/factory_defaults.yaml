version: 1

backtester_bin: backtester/target/release/mei-backtester
artifacts_dir: artifacts
candles_db_dir: candles_dbs
funding_db: candles_dbs/funding_rates.db

balance:
  mode: live_equity

comparison:
  require_challenger_win: true
  primary:
    min_total_pnl_uplift: 50.0
    min_profit_factor_uplift: 0.0
    max_drawdown_slack: 0.50
  fallback:
    min_total_pnl_uplift: 0.0
    min_profit_factor_uplift: 0.05
    max_drawdown_slack: 0.50
  conservative:
    min_total_pnl_uplift: 0.0
    min_profit_factor_uplift: 0.0
    max_drawdown_slack: 0.25

validation:
  min_trades: 30
  slippage_bps: 20.0
  max_top1_pnl_pct: 0.50
  walk_forward_splits: 3
  parity_abs_eps: 0.001
  parity_rel_eps: 0.000001
  parity_trade_delta_max: 0
  parity_enforce: true

selection:
  selected_roles:
    - primary
    - fallback
    - conservative
  paper_targets:
    - role: primary
      slot: 1
      service: openclaw-ai-quant-trader-v8-paper1
      yaml_path: config/strategy_overrides.paper1.yaml
    - role: fallback
      slot: 2
      service: openclaw-ai-quant-trader-v8-paper2
      yaml_path: config/strategy_overrides.paper2.yaml
    - role: conservative
      slot: 3
      service: openclaw-ai-quant-trader-v8-paper3
      yaml_path: config/strategy_overrides.paper3.yaml

deployment:
  apply_to_paper: true
  restart_services: true
  apply_to_live: false
  restart_live_service: true
  live_yaml_path: config/strategy_overrides.live.yaml
  live_service: openclaw-ai-quant-live-v8

live_governance:
  live_db_path: trading_engine_v8_live.db
  state_path: artifacts/state/factory_live_primary.json
  stage1_exposure_factor: 0.25
  stage2_exposure_factor: 0.50
  stage3_exposure_factor: 1.00
  min_stage_hours: 24.0
  rotation_trade_window: 30
  min_live_profit_factor: 1.0
  max_live_drawdown_pct: 15.0
  max_config_age_days: 14.0

profiles:
  daily:
    sweep_spec: backtester/sweeps/full_144v.yaml
    # Used only when balance.mode=fixed. Financial-grade default is live_equity.
    initial_balance: 10000.0
    gpu: true
    tpe: true
    tpe_trials: 1000000
    tpe_batch: 256
    tpe_seed: 42
    sweep_top_k: 50000
    shortlist_per_mode: 5
    allow_unsafe_gpu_sweep: false

  deep:
    sweep_spec: backtester/sweeps/full_144v.yaml
    # Used only when balance.mode=fixed. Financial-grade default is live_equity.
    initial_balance: 10000.0
    gpu: true
    tpe: true
    tpe_trials: 10000000
    tpe_batch: 256
    tpe_seed: 42
    sweep_top_k: 50000
    shortlist_per_mode: 8
    allow_unsafe_gpu_sweep: false
