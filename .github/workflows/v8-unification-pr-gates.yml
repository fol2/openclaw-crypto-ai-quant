name: V8 Engine Unification Gates

on:
  pull_request:
    branches: [master, major-v8]
  push:
    branches: [master, major-v8]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unification-gates:
    name: v8-unification-gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect engine unification changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            unification:
              - 'runtime/**'
              - 'backtester/**'
              - 'hub/**'
              - 'ws_sidecar/**'
              - 'docs/runbook.md'
              - '.github/workflows/v8-unification-pr-gates.yml'

      - name: Set up Rust
        if: steps.changes.outputs.unification == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Run Rust unification checks
        if: steps.changes.outputs.unification == 'true'
        run: |
          cargo test --workspace
          cargo test --manifest-path hub/Cargo.toml
          cargo test --manifest-path ws_sidecar/Cargo.toml
          ./scripts/ci_rust_runtime_foundation.sh

      - name: Skip when unification files are unchanged
        if: steps.changes.outputs.unification != 'true'
        run: echo "Unification files unchanged; skipping unification gates."
