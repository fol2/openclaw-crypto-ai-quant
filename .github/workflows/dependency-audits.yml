name: Dependency Audits

on:
  pull_request:
    branches: [master]
    paths:
      - "backtester/Cargo.toml"
      - "backtester/Cargo.lock"
      - "backtester/**/Cargo.lock"
      - ".github/workflows/dependency-audits.yml"
  push:
    branches: [master]
    paths:
      - "backtester/Cargo.toml"
      - "backtester/Cargo.lock"
      - "backtester/**/Cargo.lock"
      - ".github/workflows/dependency-audits.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify zero-Python dependency surfaces
        run: |
          if find . -type f \( -name '*.py' -o -name 'pyproject.toml' -o -name 'uv.lock' \) | grep -q .; then
            echo "Expected zero Python dependency surfaces, but found:"
            find . -type f \( -name '*.py' -o -name 'pyproject.toml' -o -name 'uv.lock' \) | sort
            exit 1
          fi
          echo "Zero Python dependency surface confirmed."

  cargo-audit:
    name: Rust dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        working-directory: backtester
        run: cargo audit
